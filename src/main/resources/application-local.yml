spring:
  datasource:
    url: jdbc:mysql://localhost:3306/miruni?serverTimezone=Asia/Seoul&useSSL=false
    username: miruni_user
    password: miruni_pass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update  # 또는 create / none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect